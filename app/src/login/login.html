<mat-toolbar>
  <div class="flex w-full justify-between items-center">
    <div>
      <img src="imagens/logo-branco.png"/>
    </div>
    <div class="flex items-center gap-2 font-bold">
      <span>Legis-Redator - ALRN</span>
      <img src="imagens/redator.png" class="pt-2"/>
    </div>
  </div>
</mat-toolbar>

<div class="flex justify-center w-full pt-4">
  <div class="flex flex-col">  
    <div><img src="imagens/logo.png"/></div>
    <div>
      <h1>Entrar no Sistema</h1>
      <form class="flex flex-col">
        <mat-form-field appearance="outline">
          <mat-label>CPF</mat-label>
          <input type="text" matInput [formControl]="cpf">
          @if (cpf.hasError('required') || cpf.hasError('cpfInvalido')) {
            <mat-error><span class="text-sm text-red-600">Por favor, digite um CPF válido</span></mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input type="password" matInput [formControl]="senha">
        </mat-form-field>

        <button mat-raised-button type="submit"> Entrar </button>

      </form>
    </div>
  </div>
</div>
