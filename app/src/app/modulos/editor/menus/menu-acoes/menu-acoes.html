<!-- Backdrop transparente para fechar ao clicar fora -->
<div class="overlay-menu fixed inset-0" (click)="fechar.emit()"></div>

<div class="relative flex">
  <!-- AFAZER: definir melhor maneira de altura máxima -->
  <div class="caixa-menu bg-white border border-gray-200 rounded-lg shadow-xl flex flex-col py-4 max-h-[28vh] overflow-y-auto">
    <button class="opcao-menu-editor" (click)="toggleSubmenuTiposAberto()">
      <mat-icon class="scale-75 text-gray-500">notes</mat-icon> Alterar Tipo
    </button>
    <button class="opcao-menu-editor" (click)="emitirAdicionarAnotacao()">
      <mat-icon class="scale-75 text-gray-500">edit</mat-icon> Adicionar Anotação
    </button>
    <button class="opcao-menu-editor" (click)="emitirGerarReferencias()">
      <mat-icon class="scale-75 text-gray-500">link</mat-icon> Gerar Referências
    </button>
    <button class="opcao-menu-editor">
      <!-- AFAZER: procurar nome melhor -->
      <mat-icon class="scale-75 text-gray-500">error</mat-icon> Checar Violações
    </button>
    <button class="opcao-menu-editor" (click)="emitirRemover()">
      <mat-icon class="scale-75 text-gray-500">delete</mat-icon> Remover
    </button>

  </div>
      <!-- AFAZER: definir melhor a forma de controle de largura do submenu -->
    @if(submenuTiposAberto()) {
      <div class="relative">
        <app-menu-tipos (fechar)="toggleSubmenuTiposAberto()" (tipoSelecionado)="retornarTipoSelecionado($event)"/>
      </div>
    }
</div>
