<div class="folha">
  <div class="mx-auto">
    <div class="flex flex-col gap-[2px]">
      @for (bloco of blocos(); track bloco.id; let i = $index) {
        <div class="block-wrapper group flex items-start relative transition-all duration-200"
          [class.dragging]="idBlocoSendoArrastado() === bloco.id" [class.drag-over]="idBlocoSobreposto() === bloco.id"
          [style.marginLeft.px]="bloco.nivelIndentacao * 24" draggable="true"
          (dragstart)="aoIniciarArrasto($event, bloco.id)" (dragend)="aoFinalizarArrasto()"
          (dragover)="aoArrastarSobre($event, bloco.id)" (dragleave)="aoSairDoArrasto()"
          (drop)="aoSoltar($event, bloco.id)">
            <app-bloco-edicao class="w-full" [dados]="bloco"/>
        </div>
      }
    </div>
  </div>
</div>
