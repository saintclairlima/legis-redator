<div class="folha">
  <div class="flex flex-col gap-2">
    @for (blocoSignal of blocos(); track blocoSignal().id; let idx = $index) {
      <div #wrapperBloco class="bloco-wrapper"
        [style.marginLeft.px]="blocoSignal().nivelIndentacao * 24"
        [class.dragging]="idBlocoSendoArrastado() === blocoSignal().id" [class.drag-over]="idBlocoSobreposto() === blocoSignal().id"
         [style.transform]="idBlocoSendoArrastado()  === blocoSignal().id
          ? 'translateY(' + (0) + 'px)'
          : ''">

        <div class="botao-drag"
          draggable="true"
          (dragstart)="aoIniciarArrasto($event, blocoSignal().id)" (dragend)="aoFinalizarArrasto()"
          (dragover)="aoArrastarSobre($event, blocoSignal().id)" (dragleave)="aoSairDoArrasto()"
          (drop)="aoSoltar($event, blocoSignal().id)"   
        >
          <mat-icon>drag_indicator</mat-icon>
        </div>

        <app-bloco-edicao
          class="w-full"
          [dadosSignal]="blocoSignal"
          [(focoManual)]="focoManual"
          [dadosBlocoFoco]="dadosBlocoFoco()?.id === blocoSignal().id? dadosBlocoFoco() : null"
          (aoAlterarDadosBloco)="aoAlterarDadosBloco(blocoSignal().id, $event)"
          (aoAdicionarBlocoAbaixo)="aoAdicionarBlocoAbaixo(idx, $event)"
          (aoRemoverBloco)="aoRemoverBloco(blocoSignal().id)"/>
      </div>
    }
  </div>
</div>
