<mat-toolbar>
  <div class="flex w-full justify-between items-center">
    <div>
      <img src="imagens/logo-branco.png"/>
    </div>
    <div class="flex items-center gap-2 font-bold">
      <span>Legis-Redator - ALRN</span>
      <img src="imagens/redator.png" class="pt-2"/>
    </div>
  </div>
</mat-toolbar>

<div class="flex justify-center w-full pt-4">
  <div class="flex flex-col">  
    <div class="flex justify-center"><img src="imagens/logo.png"/></div>

    <div class="mt-10 bg-white rounded-sm drop-shadow-sm p-7 caixa-login">
      <div class="flex justify-center text-2xl">ENTRAR</div>
      <form [formGroup]="form" (ngSubmit)="fazerLogin()" class="flex flex-col gap-5 pt-5">
        <mat-form-field appearance="outline">
          <mat-label>CPF</mat-label>
          <input type="text" matInput formControlName="cpf">
          @if (form.controls.cpf.hasError('required') || form.controls.cpf.hasError('cpfInvalido')) {
            <mat-error><span class="text-sm text-red-600">Por favor, digite um CPF válido</span></mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Senha</mat-label>
          <input type="password" matInput formControlName="senha">
        </mat-form-field>

        <button matButton="filled" type="submit" (click)="fazerLogin()">Entrar</button>
      </form>

      <div class="flex justify-center pt-5 mb-5">
        <span
          class="text-sm link"
          (click)="toggleExibirMensagemEsqueceuSenha()">
          {{exibirMensagemEsqueceuSenha() ? 'Entendi' : 'Esqueceu a senha?'}}
        </span>
      </div>

      <app-mensagem-detalhes
        [conteudo]="['Sua senha é a mesma utilizada no Portal do Servidor.', 'Caso deseje recuperar ou redefinir sua senha, essa solicitação deve ser feita pelo Portal do Servidor.']"
        [exibirMensagem]="exibirMensagemEsqueceuSenha()"
        tipoMensagem="info"/>

    </div>

    <footer>
      <span class="divisoria"></span>
      <small>DESENVOLVIMENTO</small>
      <span class="setor">DEVDGT</span>
    </footer>

  </div>
</div>
