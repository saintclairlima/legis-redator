<h2 mat-dialog-title>{{ data.titulo }}</h2>
<mat-dialog-content class="whitespace-pre-line">
  {{ data.mensagem }}
</mat-dialog-content>
<mat-dialog-actions class="flex justify-end gap-2">
  <button mat-button (click)="ref.close(false)">{{ textoCancelar }}</button>
  <button mat-flat-button [color]="corConfirmar" (click)="ref.close(true)" cdkFocusInitial>
    {{ textoConfirmar }}
  </button>
</mat-dialog-actions>
